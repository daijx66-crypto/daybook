<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 夜谈台 · daybook</title>
    <style>:root {
  color-scheme: light;
  --bg: #f8f7f3;
  --surface: #ffffff;
  --surface-soft: #f3f1ec;
  --ink: #171717;
  --muted: #62615c;
  --faint: #918f87;
  --line: #dedbd2;
  --line-strong: #c7c1b6;
  --blue: #1261d6;
  --green: #168052;
  --orange: #c9541a;
  --danger: #c93828;
  --warning: #b7791f;
  --shadow: 0 18px 60px rgba(20, 20, 18, 0.10);
  --mono: "SFMono-Regular", "Roboto Mono", Consolas, monospace;
  --sans: -apple-system, system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  /* no decorative serif — use the normal system font for display too */
  --serif: -apple-system, system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  letter-spacing: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

button,
input,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 248px minmax(620px, 1fr) 344px;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0) 24%),
    var(--bg);
}

.sidebar,
.right-panel {
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(14px);
  border-color: var(--line);
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--line);
}

.brand {
  min-height: 96px;
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--line);
}

.brand-mark {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  background: #111;
  color: #fff;
  border-radius: 6px;
  font-weight: 760;
  font-size: 12px;
  letter-spacing: 0.05em;
}

.brand h1 {
  margin: 0 0 4px;
  font-size: 20px;
  line-height: 1.1;
}

.brand p,
.daily-header p,
.agent-head p,
.local-note p,
.metric small,
.source-preview p,
.dry-alert p,
.trace-detail p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.sidebar-section {
  padding: 20px 14px;
  border-bottom: 1px solid var(--line);
}

.section-label,
.small-caps {
  margin: 0 0 12px;
  color: #56534c;
  font-size: 11px;
  font-weight: 780;
  letter-spacing: 0.11em;
  text-transform: uppercase;
}

.date-list {
  display: grid;
  gap: 7px;
}

.date-item {
  width: 100%;
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 4px 10px;
  align-items: center;
  padding: 10px 9px;
  border: 1px solid transparent;
  border-radius: 7px;
  background: transparent;
  color: var(--ink);
  text-align: left;
}

.date-item span {
  grid-row: span 2;
  color: var(--muted);
  font-size: 13px;
}

.date-item strong {
  font-size: 15px;
  font-weight: 720;
}

.date-item em {
  color: var(--muted);
  font-size: 12px;
  font-style: normal;
}

.date-item:hover,
.date-item.active {
  background: #e9f0fb;
  border-color: #cbdaf1;
}

.date-item.active {
  box-shadow: inset 3px 0 0 var(--blue);
}

.health-panel {
  margin-top: auto;
}

.health-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 13px;
}

.health-row strong {
  color: var(--green);
  font-size: 13px;
}

.local-note {
  margin: 14px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.74);
  font-size: 13px;
}

.local-note strong {
  display: block;
  margin-bottom: 5px;
}

.workspace {
  min-width: 0;
  padding: 0 22px 34px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 5;
  min-height: 64px;
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  background: rgba(248, 247, 243, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.topbar-left,
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 9px;
}

.mobile-date-strip {
  display: none;
}

.icon-button,
.primary,
.secondary,
.mini-action,
.segmented button {
  min-height: 36px;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-weight: 650;
}

.icon-button {
  width: 38px;
  padding: 0;
  font-size: 22px;
  line-height: 1;
}

.primary {
  padding: 0 14px;
  background: #143c2c;
  border-color: #143c2c;
  color: #fff;
}

.secondary {
  padding: 0 13px;
}

.compact {
  min-height: 32px;
  font-size: 12px;
}

.full-width {
  width: 100%;
}

.stack-gap {
  margin-top: 8px;
}

.segmented {
  display: flex;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.72);
}

.segmented button {
  min-height: 30px;
  padding: 0 12px;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
}

.segmented button.active {
  background: #111;
  color: #fff;
}

.segmented.thin {
  width: 100%;
  margin-bottom: 14px;
}

.segmented.thin button {
  flex: 1;
  padding: 0 6px;
  font-size: 12px;
}

.search {
  width: 230px;
  height: 38px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--surface);
}

.search span {
  color: var(--faint);
  font-size: 12px;
}

.search input {
  width: 100%;
  min-width: 0;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
  font-size: 13px;
}

.daily-header {
  display: grid;
  grid-template-columns: minmax(320px, 1fr) minmax(420px, 0.88fr);
  gap: 26px;
  padding: 30px 0 22px;
  border-bottom: 1px solid var(--line);
}

.daily-header h2 {
  margin: 0 0 12px;
  font-family: var(--serif);
  font-size: clamp(36px, 4vw, 62px);
  line-height: 0.98;
  font-weight: 520;
}

.metrics {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr 1fr;
  gap: 0;
  align-self: end;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.68);
}

.metric {
  min-height: 118px;
  padding: 18px 18px 16px;
  border-right: 1px solid var(--line);
}

.metric:last-child {
  border-right: 0;
}

.metric span {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 750;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.metric strong {
  display: block;
  margin-bottom: 7px;
  color: var(--blue);
  font-family: var(--serif);
  font-size: 42px;
  line-height: 1;
  font-weight: 500;
}

.meter {
  width: 100%;
  height: 7px;
  overflow: hidden;
  background: #dad7ce;
  border-radius: 999px;
}

.meter i {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
}

.timeline-panel {
  margin-top: 20px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #121820;
  color: #eef3f7;
  box-shadow: var(--shadow);
}

.panel-heading {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.panel-heading h3 {
  margin: 0;
  font-size: 18px;
  line-height: 1.2;
}

.timeline-panel .small-caps {
  color: #aeb9c4;
}

.timeline-panel .secondary {
  background: transparent;
  border-color: #344150;
  color: #dce6ef;
}

.timeline {
  position: relative;
  height: 176px;
  overflow: hidden;
  border: 1px solid #26323e;
  border-radius: 7px;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px) 0 0 / 11.11% 100%,
    linear-gradient(180deg, transparent 43px, rgba(255, 255, 255, 0.08) 44px, transparent 45px) 0 0 / 100% 44px,
    #111820;
}

.time-axis {
  position: absolute;
  top: 9px;
  left: 120px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  color: #aeb9c4;
  font-family: var(--mono);
  font-size: 11px;
}

.lane-label {
  position: absolute;
  left: 16px;
  width: 94px;
  padding-left: 10px;
  color: #edf5fb;
  font-size: 13px;
  font-weight: 720;
  border-left: 3px solid var(--accent);
}

.now-line {
  position: absolute;
  top: 28px;
  bottom: 12px;
  left: 58%;
  width: 1px;
  background: repeating-linear-gradient(180deg, #d8dee7, #d8dee7 4px, transparent 4px, transparent 8px);
  opacity: 0.85;
}

.timeline-chip {
  position: absolute;
  max-width: 150px;
  min-height: 28px;
  padding: 5px 8px;
  border: 1px solid color-mix(in srgb, var(--accent), #fff 16%);
  border-radius: 5px;
  background: color-mix(in srgb, var(--accent), #111820 78%);
  color: #f5fbff;
  font-size: 11px;
  line-height: 1.25;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.timeline-chip span {
  margin-right: 6px;
  color: #d2edf0;
  font-family: var(--mono);
}

.timeline-chip.conflict,
.timeline-chip.quarantined,
.timeline-chip.failed {
  border-color: #d4523d;
  background: rgba(122, 29, 22, 0.8);
}

.timeline-chip.pending_sync {
  border-color: #93a6bb;
  background: rgba(45, 55, 68, 0.92);
}

.timeline-chip.duplicate {
  border-color: #b7791f;
  background: rgba(86, 59, 19, 0.86);
}

.timeline-chip.redacted {
  border-color: #d4523d;
  background: repeating-linear-gradient(135deg, rgba(82, 24, 24, 0.9), rgba(82, 24, 24, 0.9) 6px, rgba(128, 36, 36, 0.9) 6px, rgba(128, 36, 36, 0.9) 12px);
}

/* --- Threads: cross-agent exchanges, the centerpiece --- */
.threads {
  margin-top: 22px;
}

.threads .panel-heading h3 {
  font-size: 20px;
}

.threads-count {
  flex: none;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

.thread-list {
  display: grid;
  gap: 14px;
}

.thread {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}

.thread.has-disagreement {
  border-color: color-mix(in srgb, #d4523d, var(--line) 55%);
  background: linear-gradient(180deg, rgba(212, 82, 61, 0.045), var(--surface) 38%);
}

.thread-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 13px;
}

.thread-head h4 {
  margin: 0;
  font-size: 16px;
  line-height: 1.3;
}

.thread-flag {
  flex: none;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(212, 82, 61, 0.12);
  color: #a3361f;
  border: 1px solid rgba(212, 82, 61, 0.3);
}

.thread-flag.agreed {
  background: rgba(22, 128, 82, 0.1);
  color: #14613e;
  border-color: rgba(22, 128, 82, 0.28);
}

.thread-chain {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 10px;
}

.thread-node {
  padding: 10px 12px 10px 14px;
  border-left: 3px solid var(--accent);
  background: color-mix(in srgb, var(--accent), transparent 94%);
  border-radius: 0 8px 8px 0;
}

.thread-node.reply {
  margin-left: 24px;
}

.human-thread-chain .thread-node.reply {
  margin-left: 0;
}

.thread-node-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.thread-node-meta strong {
  font-size: 13px;
  color: var(--accent);
}

.thread-node-meta time {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

.thread-node p {
  margin: 0;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ink);
}

.stance {
  font-size: 11px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 999px;
}

.stance.disagree {
  background: rgba(212, 82, 61, 0.14);
  color: #a3361f;
}

.stance.agree {
  background: rgba(22, 128, 82, 0.12);
  color: #14613e;
}

.stance.build {
  background: rgba(183, 121, 31, 0.16);
  color: #8a5a12;
}

.stance.open {
  background: rgba(0, 0, 0, 0.05);
  color: var(--muted);
}

.stance.cowork {
  background: rgba(18, 97, 214, 0.12);
  color: #0f4ba3;
}

.stance.handoff {
  background: rgba(183, 121, 31, 0.14);
  color: #8a5a12;
}

.thread-flags {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: none;
}

.thread-demo {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.05);
  color: var(--muted);
  border: 1px dashed var(--line-strong);
}

.thread-flag.cowork {
  background: rgba(18, 97, 214, 0.1);
  color: #0f4ba3;
  border-color: rgba(18, 97, 214, 0.26);
}

.agent-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
  margin-top: 20px;
}

.agent-grid.single-agent {
  grid-template-columns: minmax(360px, 760px);
}

.agent-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  padding: 18px;
  border: 1px solid var(--line);
  border-top: 4px solid var(--accent);
  border-radius: 8px;
  background: var(--surface);
}

.agent-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}

.agent-head h3 {
  margin: 0 0 4px;
  color: var(--accent);
  font-family: var(--serif);
  font-size: 28px;
  line-height: 1.05;
  font-weight: 560;
}

.mini-action {
  min-height: 30px;
  padding: 0 10px;
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent), #fff 64%);
  background: var(--soft);
}

.agent-list {
  margin: 0 0 16px;
}

.agent-list h4 {
  margin: 0 0 8px;
  font-family: var(--serif);
  font-size: 17px;
}

.agent-list ul,
.weekly-block ul {
  margin: 0;
  padding-left: 18px;
}

.agent-list li,
.weekly-block li {
  margin: 0 0 7px;
  color: #2b2b29;
  font-size: 14px;
  line-height: 1.45;
}

.trace-box {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}

.trace-box > span {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 750;
}

.source-pill {
  max-width: 100%;
  margin: 0 6px 6px 0;
  padding: 5px 8px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--surface-soft);
  color: #35332f;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.composer {
  margin-top: 12px;
  padding: 12px;
  border: 1px solid color-mix(in srgb, var(--accent), #fff 70%);
  border-radius: 8px;
  background: var(--soft);
}

.composer label {
  display: block;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 750;
  color: color-mix(in srgb, var(--accent), #111 26%);
}

.composer textarea {
  width: 100%;
  min-height: 74px;
  margin-bottom: 9px;
  resize: vertical;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  padding: 10px;
  background: rgba(255, 255, 255, 0.86);
  color: var(--ink);
  line-height: 1.45;
  outline: none;
}

.right-panel {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  border-left: 1px solid var(--line);
}

.right-tabs {
  position: sticky;
  top: 0;
  z-index: 4;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  background: rgba(255, 255, 255, 0.86);
  border-bottom: 1px solid var(--line);
}

.right-tabs button {
  min-height: 54px;
  border: 0;
  border-bottom: 3px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 720;
}

.right-tabs button.active {
  color: var(--blue);
  border-color: var(--blue);
}

.right-content {
  padding: 18px;
}

.source-map {
  display: grid;
  grid-template-columns: 86px 30px 1fr;
  gap: 8px;
  align-items: center;
}

.source-node {
  min-height: 86px;
  display: grid;
  place-items: center;
  text-align: center;
  border: 1px solid #b4c7bd;
  border-radius: 8px;
  background: #eef5ef;
}

.source-node span {
  color: var(--green);
  font-size: 12px;
  font-weight: 760;
}

.source-node strong {
  display: block;
  font-size: 14px;
}

.brace {
  color: #769183;
  font-family: var(--serif);
  font-size: 112px;
  line-height: 0.72;
  transform: scaleX(0.65);
}

.source-groups {
  display: grid;
  gap: 10px;
}

.source-group {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.76);
  overflow: hidden;
}

.source-group h4 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin: 0;
  padding: 10px 12px;
  background: var(--surface-soft);
  font-size: 13px;
}

.source-group h4 span {
  color: var(--muted);
  font-family: var(--mono);
  font-weight: 500;
}

.source-row {
  width: 100%;
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr);
  gap: 2px 9px;
  padding: 10px 12px;
  border: 0;
  border-top: 1px solid var(--line);
  background: transparent;
  text-align: left;
}

.source-row span {
  grid-row: span 2;
  align-self: start;
  color: var(--blue);
  font-size: 11px;
  font-weight: 780;
}

.source-row strong,
.source-row em {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.source-row strong {
  font-size: 13px;
}

.source-row em {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  font-style: normal;
}

.source-row.active,
.source-row:hover {
  background: #edf4ff;
}

.source-preview,
.trace-detail,
.dry-alert {
  margin-top: 16px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.source-preview h4,
.trace-detail h4 {
  margin: 0 0 8px;
  font-size: 16px;
}

code,
pre {
  font-family: var(--mono);
}

.source-preview code,
.trace-detail code {
  display: block;
  margin-top: 10px;
  padding: 9px;
  overflow: auto;
  border-radius: 6px;
  background: #f0eee8;
  color: #3d3930;
  font-size: 11px;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag-row span {
  padding: 4px 8px;
  border-radius: 999px;
  background: #ecf3ee;
  color: #355b45;
  font-size: 11px;
}

.conversation-list {
  display: grid;
  gap: 10px;
}

.conversation-item {
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-left: 4px solid var(--accent);
  border-radius: 8px;
  background: var(--surface);
}

.conversation-item time {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
}

.conversation-item strong {
  display: block;
  margin-bottom: 4px;
  color: var(--accent);
  font-size: 13px;
}

.conversation-item p {
  margin: 0;
  color: #282724;
  font-size: 13px;
  line-height: 1.5;
}

.weekly .preview-range {
  margin: -4px 0 16px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
}

.weekly-block {
  margin-bottom: 14px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.weekly-block h4 {
  margin: 0 0 10px;
  font-family: var(--serif);
  font-size: 17px;
}

.safety-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}

.safety-tile {
  min-height: 70px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.safety-tile span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
}

.safety-tile strong {
  display: block;
  margin-top: 6px;
  font-size: 28px;
}

.safety-tile.conflict strong,
.safety-tile.quarantined strong,
.safety-tile.redacted strong {
  color: var(--danger);
}

.safety-tile.pending_sync strong,
.safety-tile.duplicate strong {
  color: var(--warning);
}

.safety-list {
  display: grid;
  gap: 8px;
}

.safety-row {
  width: 100%;
  display: grid;
  gap: 4px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  text-align: left;
}

.safety-row span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
}

.safety-row.active {
  border-color: var(--blue);
  box-shadow: inset 3px 0 0 var(--blue);
}

.drawer-backdrop {
  position: fixed;
  inset: 0;
  z-index: 30;
  background: rgba(18, 20, 22, 0.25);
}

.dry-run-drawer {
  position: fixed;
  top: 0;
  right: 0;
  z-index: 40;
  width: min(520px, 100vw);
  height: 100vh;
  overflow: auto;
  padding: 20px;
  background: #fbfaf7;
  border-left: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.drawer-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.drawer-head h3 {
  margin: 0;
  font-family: var(--serif);
  font-size: 34px;
  line-height: 1;
}

.dry-alert {
  border-color: #d8bd8e;
  background: #fff7e9;
}

.dry-target {
  margin-top: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  overflow: hidden;
}

.dry-target-head {
  display: grid;
  grid-template-columns: 52px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 12px 14px;
  background: var(--surface-soft);
  border-bottom: 1px solid var(--line);
}

.dry-target-head span {
  color: var(--blue);
  font-size: 11px;
  font-weight: 780;
}

.dry-target-head strong {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dry-target-head em {
  color: var(--muted);
  font-size: 11px;
  font-style: normal;
}

.dry-target pre {
  margin: 0;
  padding: 14px;
  white-space: pre-wrap;
  color: #272522;
  font-size: 12px;
  line-height: 1.55;
}

.dry-target table {
  width: calc(100% - 28px);
  margin: 0 14px 14px;
  border-collapse: collapse;
  font-size: 12px;
}

.dry-target th,
.dry-target td {
  padding: 8px;
  border: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

.dry-target th {
  width: 150px;
  background: var(--surface-soft);
}

.empty {
  padding: 14px;
  color: var(--muted);
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.56);
  font-size: 13px;
}

@media (max-width: 1240px) {
  .shell {
    grid-template-columns: 218px minmax(560px, 1fr);
  }

  .right-panel {
    position: relative;
    grid-column: 2;
    height: auto;
    min-height: 420px;
    border-top: 1px solid var(--line);
  }

  .daily-header {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 900px) {
  .shell {
    display: block;
  }

  .sidebar {
    position: relative;
    height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    min-height: 74px;
  }

  .sidebar .sidebar-section:first-of-type {
    display: none;
  }

  .health-panel {
    display: none;
  }

  .local-note {
    margin-top: 0;
  }

  .workspace {
    padding: 0 14px 22px;
  }

  .topbar {
    position: relative;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .topbar-left,
  .topbar-actions {
    width: 100%;
    justify-content: space-between;
  }

  .topbar-left > .icon-button {
    display: none;
  }

  .topbar .segmented {
    width: 100%;
    overflow-x: auto;
  }

  .topbar .segmented button {
    flex: 1 0 auto;
  }

  .topbar-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .search {
    grid-column: 1 / -1;
    width: 100%;
  }

  .mobile-date-strip {
    width: 100%;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .mobile-date-strip button {
    min-width: 74px;
    min-height: 48px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 760;
  }

  .mobile-date-strip button span {
    display: block;
    margin-top: 3px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
  }

  .mobile-date-strip button.active {
    color: #fff;
    background: #111;
  }

  .mobile-date-strip button.active span {
    color: #fff;
  }

  .daily-header {
    padding-top: 22px;
  }

  .daily-header h2 {
    font-size: 38px;
  }

  .metrics {
    grid-template-columns: 1fr;
  }

  .metric {
    min-height: 92px;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .metric:last-child {
    border-bottom: 0;
  }

  .timeline-panel {
    padding: 12px;
  }

  .timeline {
    height: 222px;
    overflow-x: auto;
  }

  .timeline-chip {
    max-width: 150px;
  }

  .agent-grid,
  .agent-grid.single-agent {
    grid-template-columns: 1fr;
  }

  .right-panel {
    border-left: 0;
    border-top: 1px solid var(--line);
  }

  .right-content {
    padding: 14px;
  }

  .source-map {
    grid-template-columns: 1fr;
  }

  .brace {
    display: none;
  }

  .source-node {
    min-height: 64px;
  }

  .dry-run-drawer {
    width: 100vw;
  }
}

@media (max-width: 430px) {
  .brand h1 {
    font-size: 18px;
  }

  .topbar-actions {
    grid-template-columns: 1fr;
  }

  .daily-header h2 {
    font-size: 32px;
  }

  .panel-heading {
    flex-direction: column;
  }

  .right-tabs button {
    font-size: 12px;
  }

  .agent-column {
    padding: 15px;
  }

  .dry-target-head {
    grid-template-columns: 1fr;
  }
}

/* ============================================================
   v2 layout — Steve Jobs pass: one screen, one focus, breathing room.
   Full-width topbar + capsule toggle, collapsible rails, dark mode.
   ============================================================ */

:root { --topbar-h: 70px; }

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0e0f10;
  --surface: #17181a;
  --surface-soft: #1d1f21;
  --ink: #ededec;
  --muted: #a3a09a;
  --faint: #74726c;
  --line: #292b2e;
  --line-strong: #3a3d41;
  --shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
}

body, .app-root { transition: background-color 0.25s ease, color 0.25s ease; }

.app-root {
  min-height: 100vh;
  width: 100%;
  max-width: 100vw;
  display: flex;
  flex-direction: column;
  overflow-x: clip;
  background: var(--bg);
}

/* --- full-width topbar --- */
.app-root > .topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 28px;
  min-height: var(--topbar-h);
  padding: 12px 30px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}

.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-brand .brand-mark {
  width: 38px; height: 38px; border-radius: 10px;
  display: grid; place-items: center;
  background: var(--ink); color: var(--bg);
  font-weight: 800; font-size: 15px; letter-spacing: -0.02em;
}
.topbar-brand .brand-text h1 { margin: 0; font-size: 19px; font-weight: 750; letter-spacing: -0.01em; }
.topbar-brand .brand-text p { margin: 1px 0 0; font-size: 11.5px; color: var(--muted); }

/* capsule: language | theme */
.capsule {
  display: inline-flex; align-items: center;
  margin-left: 6px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--surface);
  overflow: hidden;
}
.capsule-half {
  border: 0; background: transparent; color: var(--ink);
  min-width: 40px; height: 30px; padding: 0 12px;
  font-size: 13px; font-weight: 650;
  display: grid; place-items: center;
}
.capsule-half:hover { background: var(--surface-soft); }
.capsule-div { width: 1px; align-self: stretch; background: var(--line-strong); }

.topbar-center { display: flex; align-items: center; gap: 12px; margin: 0 auto; }
.topbar-date { text-align: center; min-width: 120px; }
.topbar-date strong { display: block; font-size: 15px; font-weight: 700; }
.topbar-date span { font-size: 11px; color: var(--muted); }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.app-root > .topbar .icon-button.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* --- shell grid below topbar --- */
.app-root > .shell {
  flex: 1;
  min-height: 0;
  width: 100%;
  max-width: 100vw;
  display: grid;
  grid-template-columns: minmax(0, 1fr) clamp(420px, 31vw, 480px);
  background: var(--bg);
  overflow-x: clip;
}
.app-root.right-collapsed > .shell { grid-template-columns: minmax(0, 1fr); }
.app-root.right-collapsed .right-panel { display: none; }

.app-root .right-panel {
  min-width: 0;
  position: sticky;
  top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h));
  align-self: start;
  overflow-y: auto;
  background: color-mix(in srgb, var(--surface), transparent 8%);
  backdrop-filter: blur(14px);
}
.app-root .sidebar { border-right: 1px solid var(--line); }
.app-root .right-panel { border-left: 1px solid var(--line); padding: 22px 20px; }

/* --- center: breathing room --- */
.app-root .workspace {
  min-width: 0;
  padding: 30px 44px 72px;
  max-width: 1080px;
  margin: 0 auto;
  width: 100%;
}
.app-root .daily-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 28px; grid-template-columns: none; margin-bottom: 4px;
}
.app-root .daily-headline { min-width: 0; }
.daily-sub { color: var(--muted); font-size: 13.5px; margin-top: 6px; max-width: 60ch; }
.app-root .metrics { display: flex; gap: 30px; flex: none; background: transparent; border: 0; align-self: end; }
.app-root .metric { text-align: right; min-height: 0; padding: 0; border-right: 0; }
.app-root .metric strong { display: block; font-size: 25px; font-weight: 750; line-height: 1.1; }
.app-root .metric span { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }

.app-root .threads { margin-top: 30px; }
.app-root .thread-list { gap: 18px; }
.app-root .thread { padding: 20px 22px; }
.app-root .agent-grid { gap: 24px; margin-top: 30px; }
.app-root .agent-column { padding: 22px 20px; }
.app-root .agent-list { margin-bottom: 16px; }

/* dark-mode fixes for elements that hardcoded light colors */
[data-theme="dark"] .segmented { background: var(--surface-soft); }
[data-theme="dark"] .segmented button.active { background: var(--ink); color: var(--bg); }
[data-theme="dark"] .agent-column { background: color-mix(in srgb, var(--accent), var(--surface) 86%); }
[data-theme="dark"] .thread-demo { background: rgba(255, 255, 255, 0.06); }
[data-theme="dark"] .brand-mark { background: var(--ink); color: var(--bg); }

/* --- top 7-day date selector --- */
.topbar-dates { display: flex; align-items: center; gap: 8px; margin: 0 auto; }
.week-strip { display: flex; gap: 6px; }
.day-chip {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  min-width: 54px; padding: 6px 8px;
  border: 1px solid var(--line); border-radius: 9px;
  background: var(--surface); color: var(--muted);
}
.day-chip span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.day-chip strong { font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; }
.day-chip:hover { border-color: var(--line-strong); }
.day-chip.active { background: var(--ink); border-color: var(--ink); }
.day-chip.active span, .day-chip.active strong { color: var(--bg); }
.icon-button[disabled] { opacity: 0.32; cursor: default; }

/* --- number / display font fix: refined serif numerals, not techy mono --- */
.app-root .metric strong { font-family: var(--serif); font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 0; }
.thread-node-meta time,
.report-meta span { font-family: var(--sans); font-variant-numeric: tabular-nums; letter-spacing: 0; }

/* --- daily report card (the main product) --- */
.report {
  margin-top: 22px;
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.report-head {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 18px 22px;
  background: transparent; border: 0; text-align: left;
}
.report-head-text .small-caps { margin: 0 0 2px; }
.report-head-text h3 { margin: 0; font-size: 20px; }
.report-meta { display: flex; align-items: center; gap: 14px; flex: none; }
.report-meta span { font-size: 12px; color: var(--muted); }
.report-meta .hot { color: #a3361f; font-weight: 700; }
.report-meta .chevron { font-size: 12px; font-weight: 650; color: var(--ink); padding: 4px 10px; border: 1px solid var(--line); border-radius: 999px; }
.report-overview { list-style: none; margin: 0; padding: 0 22px 18px; display: grid; gap: 8px; }
.report-overview li { padding-left: 12px; border-left: 2px solid var(--accent, var(--line-strong)); font-size: 14px; line-height: 1.5; color: var(--ink); }
.report-overview li b { color: var(--accent, var(--ink)); margin-right: 6px; }
.report-empty { padding: 0 22px 18px; color: var(--muted); }
.report-body { border-top: 1px solid var(--line); padding: 18px 22px; display: grid; gap: 18px; }
.report-block h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.report-block ul { margin: 0; padding-left: 18px; display: grid; gap: 5px; font-size: 13.5px; line-height: 1.5; }
.report-publish h4 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.publish-row { display: flex; flex-wrap: wrap; gap: 8px; }
.publish-row .active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.dry-note { margin: 10px 0 0; font-size: 11.5px; color: var(--faint); }
.publish-preview { margin-top: 12px; }
.publish-preview pre {
  margin: 0 0 8px; max-height: 280px; overflow: auto;
  padding: 14px; border-radius: 10px;
  background: var(--surface-soft); border: 1px solid var(--line);
  font-family: var(--mono); font-size: 12px; line-height: 1.5; white-space: pre-wrap; color: var(--ink);
}

/* --- diary-first agent columns --- */
.agent-diary { margin: 6px 0 14px; font-size: 14px; line-height: 1.6; color: var(--ink); }
.agent-diary .muted, .muted { color: var(--muted); }
.agent-mini { margin-bottom: 12px; }
.agent-mini h4 { margin: 0 0 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
.agent-mini ul { margin: 0; padding-left: 16px; display: grid; gap: 4px; font-size: 13px; line-height: 1.45; color: var(--ink); }
.agent-mini.warn h4 { color: #a3361f; }
.human-agent-column .agent-diary { margin-bottom: 10px; }
.agent-summary-meta { margin: 0 0 12px; color: var(--muted); font-size: 13px; line-height: 1.45; }
.agent-action-list { list-style: none; margin: 0 0 14px; padding: 0; display: grid; gap: 8px; }
.agent-action-list li {
  display: grid;
  gap: 5px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--surface), var(--paper) 56%);
}
.agent-action-list p { margin: 0; font-size: 13.5px; line-height: 1.55; }

@media (max-width: 1100px) {
  .app-root > .shell,
  .app-root.right-collapsed > .shell { grid-template-columns: 1fr; }
  .app-root .right-panel { display: none; }
  .topbar-brand .brand-text p { display: none; }
  .topbar-dates { order: 3; width: 100%; overflow-x: auto; }
}

/* ============================================================
   Daily report v2 — per-agent summary sections + summarizer
   ============================================================ */
.report-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 18px 22px 6px; flex-wrap: wrap; }
.report-head-text { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.report-head-text h3 { margin: 0; font-size: 20px; }
.report-badge {
  font-size: 11px; font-weight: 600; color: var(--warning);
  padding: 2px 8px; border-radius: 999px;
  background: color-mix(in srgb, var(--warning), transparent 88%);
  border: 1px solid color-mix(in srgb, var(--warning), transparent 70%);
}
.report-author { display: flex; align-items: center; gap: 8px; }
.report-author-label { font-size: 12px; color: var(--muted); }
.summarizer { width: auto; margin: 0; }
.summarizer button { font-size: 12px; padding: 0 10px; }

.report-sections { display: grid; gap: 14px; padding: 12px 22px 4px; }
.report-section { border-left: 3px solid var(--accent); padding: 2px 0 2px 14px; }
.report-section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.agent-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: none; }
.report-section-head strong { font-size: 15px; color: var(--accent); }
.report-section-metric { margin-left: auto; font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
.report-skel { list-style: none; margin: 0; padding: 0; display: grid; gap: 4px; }
.report-skel li { font-size: 13.5px; line-height: 1.5; color: var(--ink); }
.report-skel li b { color: var(--accent); }
.report-skel li.blk b { color: var(--danger); }
.report-raw-toggle { margin-top: 6px; border: 0; background: transparent; color: var(--muted); font-size: 12px; padding: 2px 0; }
.report-raw-toggle:hover { color: var(--ink); }
.report-raw { margin: 6px 0 0; padding-left: 16px; display: grid; gap: 4px; font-size: 12.5px; line-height: 1.5; color: var(--muted); }
.report-footer { border-top: 1px solid var(--line); margin-top: 12px; padding: 16px 22px; display: grid; gap: 14px; }
.report-gen { margin: 8px 22px 0; }

.quality-hint {
  margin: 8px 22px 2px;
  padding: 10px 12px;
  border: 1px solid color-mix(in srgb, var(--warning), transparent 68%);
  border-radius: 8px;
  background: color-mix(in srgb, var(--warning), transparent 90%);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 13px;
  line-height: 1.45;
}

.quality-hint strong {
  color: var(--ink);
}

.quality-hint span {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
}

.human-report {
  padding: 12px 22px 4px;
  display: grid;
  gap: 14px;
}

.human-overview {
  margin: 0;
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
}

.human-items {
  margin: 0;
  padding-left: 22px;
  display: grid;
  gap: 12px;
}

.human-items li {

const stateWeights = {
  accepted: 1,
  pending_sync: 0.8,
  duplicate: 0.65,
  conflict: 0.45,
  redacted: 0.5,
  quarantined: 0.2,
  failed: 0.15
};

const FOLD_LABEL = "后台 / 杂项";
const SCAFFOLD_PATTERNS = [
  /read the full prompt from stdin/i,
  /follow all safety gates/i,
  /do not print secrets/i,
  /execute it carefully/i,
  /\bapi\s*key\b|密钥|private key|bearer token|secret/i,
  /system-reminder/i,
  /environment_context/i
];

function getEvents() {
  return EVENTS;
}

function getSources() {
  return SOURCES;
}

function sourceById(id) {
  return SOURCES.find((source) => source.sourceId === id);
}

function agentMeta(agentId) {
  return AGENTS[agentId];
}

function dates() {
  return JOURNAL_DATES;
}

function eventsForDate(date, sourceEvents = EVENTS) {
  return sourceEvents
    .filter((event) => event.date === date)
    .sort((a, b) => a.occurredAt.localeCompare(b.occurredAt));
}

function classify(event) {
  const type = event.eventType;
  if (["artifact", "task_update", "decision", "source_captured", "handoff"].includes(type)) return "done";
  if (type === "learning") return "learned";
  if (type === "suggestion" || type === "sync_plan") return "tomorrow";
  if (["blocked", "conflict", "quarantined"].includes(type) || ["conflict", "quarantined", "failed", "redacted"].includes(event.state)) return "blockers";
  return "done";
}

function pushLimited(list, value) {
  if (!list.includes(value)) list.push(value);
}

function isDisplayNoise(event) {
  const project = event?.payload?.project || "";
  const title = event?.payload?.title || "";
  if (project === FOLD_LABEL || title === FOLD_LABEL) return true;
  return false;
}

function displayLine(event) {
  if (!event?.payload) return "";
  const project = event.payload.project || "";
  const title = event.payload.title || "";
  const summary = event.payload.summary || "";
  const text = summary.trim();
  if (!text || isDisplayNoise(event)) return "";
  if (SCAFFOLD_PATTERNS.some((pattern) => pattern.test(text))) return "";
  if (project && text === project) return "";
  if (title && text === title) return "";
  return text;
}

function agentProjection(agentId, dayEvents) {
  const meta = AGENTS[agentId];
  const ownEvents = dayEvents.filter((event) => event.sourceAgent === agentId);
  const projection = {
    agentId,
    name: meta.name,
    role: meta.role,
    accent: meta.accent,
    done: [],
    learned: [],
    tomorrow: [],
    blockers: [],
    projects: [],
    projectBreakdown: [],
    sessionCount: 0,
    sourceIds: [],
    events: ownEvents.map((event) => event.eventId)
  };

  const byProject = new Map();
  ownEvents.forEach((event) => {
    const bucket = classify(event);
    const line = displayLine(event);
    const realLine = Boolean(line);
    if (realLine && bucket === "done") pushLimited(projection.done, line);
    if (realLine && bucket === "learned") pushLimited(projection.learned, line);
    if (realLine && bucket === "tomorrow") pushLimited(projection.tomorrow, line);
    if (realLine && bucket === "blockers") pushLimited(projection.blockers, line);
    const proj = event.payload.project;
    if (proj && proj !== FOLD_LABEL) {
      pushLimited(projection.projects, proj);
      projection.sessionCount += event.payload.sessionCount || 1;
      if (!byProject.has(proj)) byProject.set(proj, { project: proj, count: 0, samples: [], blocker: false });
      const g = byProject.get(proj);
      g.count += event.payload.sessionCount || 1;
      if (realLine && g.samples.length < 3 && !g.samples.includes(line)) g.samples.push(line);
      if (bucket === "blockers") g.blocker = true;
    }
    event.sourceIds.forEach((sourceId) => pushLimited(projection.sourceIds, sourceId));
  });

  // Per-project breakdown (real projects only), busiest first — the report skeleton.
  projection.projectBreakdown = [...byProject.values()].sort((a, b) => b.count - a.count);
  // No fake placeholders — an empty agent is rendered honestly by the view (i18n).
  return projection;
}

function conversation(dayEvents) {
  return dayEvents.map((event) => ({
    id: `conv-${event.eventId}`,
    date: event.date,
    time: event.occurredAt.slice(11, 16),
    agentId: event.sourceAgent,
    kind: event.eventType === "handoff" ? "handoff" : event.eventType === "decision" ? "decision" : event.eventType === "sync_plan" ? "sync" : event.eventType === "conflict" ? "question" : "note",
    text: `${event.payload.title}：${event.payload.summary}`,
    sourceIds: event.sourceIds
  }));
}

// Build EXPLICIT cross-agent threads: an entry that replies to another entry (via
// parentEventId) forms a chain. We surface only chains where two or more
// different agents take part — agents referencing and pushing back on each other.
// These only exist in the seed demo (real ingested events carry no parentEventId).
function buildExplicitThreads(dayEvents) {
  const byId = new Map(dayEvents.map((event) => [event.eventId, event]));
  const childrenOf = new Map();
  const isReply = new Set();
  dayEvents.forEach((event) => {
    if (event.parentEventId && byId.has(event.parentEventId)) {
      isReply.add(event.eventId);
      if (!childrenOf.has(event.parentEventId)) childrenOf.set(event.parentEventId, []);
      childrenOf.get(event.parentEventId).push(event);
    }
  });

  const node = (event, isRoot) => ({
    eventId: event.eventId,
    agentId: event.sourceAgent,
    name: AGENTS[event.sourceAgent].name,
    accent: AGENTS[event.sourceAgent].accent,
    time: event.occurredAt.slice(11, 16),
    stance: event.payload.stance || (isRoot ? "open" : ""),
    title: event.payload.title,
    summary: event.payload.summary
  });

  const collect = (event, isRoot) => {
    const out = [node(event, isRoot)];
    (childrenOf.get(event.eventId) || [])
      .sort((a, b) => a.occurredAt.localeCompare(b.occurredAt))
      .forEach((child) => out.push(...collect(child, false)));
    return out;
  };

  const roots = dayEvents.filter((event) => childrenOf.has(event.eventId) && !isReply.has(event.eventId));

  return roots
    .map((root) => {
      const nodes = collect(root, true);
      const participants = [...new Set(nodes.map((entry) => entry.agentId))];
      return {
        rootId: root.eventId,
        topic: root.payload.title,
        nodes,
        participantCount: participants.length,
        hasDisagreement: nodes.some((entry) => entry.stance === "disagree"),
        time: nodes[0].time
      };
    })
    .filter((thread) => thread.participantCount >= 2)
    .sort((a, b) => (b.hasDisagreement ? 1 : 0) - (a.hasDisagreement ? 1 : 0) || a.time.localeCompare(b.time));
}

// Build IMPLICIT threads from REAL data: when 2+ agents worked the same project on
// the same day, that co-working relationship objectively exists — we surface it
// honestly (neutral "co_worked" stance), never inventing a disagreement.
function buildImplicitThreads(dayEvents) {
  const real = dayEvents.filter(
    (event) => event.sourceInstance === "local-import" &&
      event.payload.project &&
      event.payload.project !== "后台 / 杂项"
  );
  const byProject = new Map();
  real.forEach((event) => {
    const p = event.payload.project;
    if (!byProject.has(p)) byProject.set(p, []);
    byProject.get(p).push(event);
  });

  const threads = [];
  for (const [project, evs] of byProject) {
    const agents = [...new Set(evs.map((e) => e.sourceAgent))];
    if (agents.length < 2) continue;
    // One representative entry per agent (the most substantive), so a co-work
    // thread reads as "who worked on this", not a flood of near-duplicate lines.
    const repByAgent = new Map();
    for (const e of evs) {
      const cur = repByAgent.get(e.sourceAgent);
      if (!cur || (e.payload.summary || "").length > (cur.payload.summary || "").length) {
        repByAgent.set(e.sourceAgent, e);
      }
    }
    const reps = [...repByAgent.values()].sort((a, b) => a.occurredAt.localeCompare(b.occurredAt));
    const nodes = reps.map((event, index) => ({
      eventId: event.eventId,
      agentId: event.sourceAgent,
      name: AGENTS[event.sourceAgent].name,
      accent: AGENTS[event.sourceAgent].accent,
      time: event.occurredAt.slice(11, 16),
      stance: index === 0 ? "open" : "co_worked",
      title: event.payload.title,
      summary: event.payload.summary
    }));
    threads.push({
      rootId: `implicit-${project}`,
      topic: project,
      nodes,
      participantCount: reps.length,
      hasDisagreement: false,
      implicit: true,
      demo: false,
      time: nodes[0].time
    });
  }
  return threads.sort((a, b) => b.participantCount - a.participantCount || a.topic.localeCompare(b.topic));
}

// Combined: real co-working threads first (the everyday signal), then the seed
// demo's full-blooded disagreement threads (clearly flagged demo in the UI).
function buildThreads(dayEvents) {
  const implicit = buildImplicitThreads(dayEvents);
  const explicit = buildExplicitThreads(dayEvents).map((thread) => ({ ...thread, implicit: false, demo: true }));
  return [...implicit, ...explicit];
}

function safety(dayEvents) {
  const counts = {
    accepted: 0,
    duplicates: 0,
    conflicts: 0,
    quarantined: 0,
    redacted: 0,
    pendingSync: 0
  };

  const items = dayEvents
    .filter((event) => event.state !== "accepted")
    .map((event) => {
      if (event.state === "duplicate") counts.duplicates += 1;
      if (event.state === "conflict") counts.conflicts += 1;
      if (event.state === "quarantined") counts.quarantined += 1;
      if (event.state === "redacted") counts.redacted += 1;
      if (event.state === "pending_sync") counts.pendingSync += 1;
      if (event.state === "failed") counts.quarantined += 1;
      return {
        id: `safety-${event.eventId}`,
        state: event.state,
        title: event.payload.title,
        explanation: safetyExplanation(event),
        traceId: event.traceId,
        eventId: event.eventId
      };
    });

  counts.accepted = dayEvents.filter((event) => event.state === "accepted").length;
  return { ...counts, items };
}

function safetyExplanation(event) {
  if (event.state === "duplicate") return "幂等键命中，重复事件被忽略，只保留第一条可读记录。";
  if (event.state === "conflict") return "多个 agent 对同一决策给出不同建议，需要用户确认后再沉淀。";
  if (event.state === "quarantined") return `schema 校验失败，原因：${event.payload.errorReason || "未知字段错误"}。`;
  if (event.state === "redacted") return "检测到形似 secret 的 mock 文本，已本地脱敏，不展示原值。";
  if (event.state === "pending_sync") return "仅进入 dry-run 队列，没有调用飞书 API。";
  if (event.state === "failed") return `模拟失败：${event.payload.errorReason || "可恢复错误"}。`;
  return "已记录为非标准状态，等待人工确认。";
}

function buildDailyProjection(date, sourceEvents = EVENTS) {
  const dayEvents = eventsForDate(date, sourceEvents);
  const unresolvedCount = dayEvents.filter((event) => ["conflict", "quarantined", "failed", "redacted"].includes(event.state)).length;
  const syncCompleteness = dayEvents.length
    ? Math.round((dayEvents.reduce((sum, event) => sum + (stateWeights[event.state] || 0.5), 0) / dayEvents.length) * 100)
    : 0;
  const sourceIds = [...new Set(dayEvents.flatMap((event) => event.sourceIds))];
  const dateText = new Intl.DateTimeFormat("zh-CN", {
    timeZone: "Asia/Shanghai",
    month: "long",
    day: "numeric",
    weekday: "long"
  }).format(new Date(`${date}T12:00:00+08:00`));

  return {
    date,
    title: dateText,
    summary: summarizeDay(dayEvents),
    syncCompleteness,
    unresolvedCount,
    localStoreHealth: unresolvedCount >= 3 ? "warning" : "healthy",
    dryRunSyncState: dayEvents.some((event) => event.state === "pending_sync") ? "pending" : "ready",
    agents: Object.keys(AGENTS).map((agentId) => agentProjection(agentId, dayEvents)),
    conversation: conversation(dayEvents),
    threads: buildThreads(dayEvents),
    sourceIds,
    safety: safety(dayEvents)
  };
}

function summarizeDay(dayEvents) {
  if (dayEvents.length === 0) return "今天还没有同步，等待本地 mock 写入。";
  const accepted = dayEvents.filter((event) => event.state === "accepted").length;
  const pending = dayEvents.filter((event) => event.state === "pending_sync").length;
  const conflicts = dayEvents.filter((event) => event.state === "conflict").length;
  return `共 ${dayEvents.length} 条本地事件，${accepted} 条进入日报正文，${pending} 条等待 dry-run 预览，${conflicts} 条需要判断。`;
}

// The daily report — daybook's main product. A readable, copyable, pushable
// one-page draft built purely from the day's events (never hand-written).
function buildDailyReport(date, sourceEvents = EVENTS) {
  const daily = buildDailyProjection(date, sourceEvents);
  const dayEvents = eventsForDate(date, sourceEvents);
  const projectsSet = new Set(dayEvents.map((e) => e.payload.project).filter((p) => p && p !== "后台 / 杂项"));
  const sessionTotal = dayEvents.reduce((sum, e) => sum + (e.payload.sessionCount || 1), 0);
  // Per-agent sections (active agents only) — each carries its projectBreakdown so
  // the view can write a real "what they did" skeleton instead of pasting raw text.
  const sections = daily.agents.filter((a) => a.done.length || a.learned.length || a.tomorrow.length || a.blockers.length || a.projectBreakdown.some((p) => p.samples.length));
  return {
    date,
    title: daily.title,
    eventCount: dayEvents.length,
    projectCount: projectsSet.size,
    agentCount: new Set(dayEvents.map((e) => e.sourceAgent)).size,
    sessionTotal,
    summarySource: "mechanical", // v2 LLM summary swaps this to "llm"; same slot, just a badge change
    sections,
    byAgent: daily.agents,
    threads: daily.threads,
    tomorrow: daily.agents.flatMap((a) => a.tomorrow),
    risks: daily.agents.flatMap((a) => a.blockers),
    disagreements: daily.threads.filter((t) => t.hasDisagreement).length,
    coworks: daily.threads.filter((t) => t.implicit).length,
    publishTargets: ["markdown", "codex", "claude_code", "hermes", "feishu"]
  };
}

// Collaboration view: turn one day's real events into swimlanes (row per agent,
// x = real time, chips = sessions colored by project) + cross-agent convergence
// (a project two+ agents both touched that day). Pure projection of existing data.
const COLLAB_PALETTE = ["#1261d6", "#168052", "#c9541a", "#7b4dd6", "#b7791f", "#0e8a8a", "#c93860", "#3a7d22"];
function buildCollab(date, sourceEvents = EVENTS) {
  const dayEvents = eventsForDate(date, sourceEvents);
  const order = ["codex", "claude_code", "hermes"];
  const toMin = (iso) => { const [h, m] = iso.slice(11, 16).split(":"); return (+h) * 60 + (+m); };
  const projects = [...new Set(dayEvents.map((e) => e.payload.project).filter((p) => p && p !== "后台 / 杂项"))];
  const colorOf = (p) => { const i = projects.indexOf(p); return i < 0 ? "#9aa0a6" : COLLAB_PALETTE[i % COLLAB_PALETTE.length]; };

  const byProjAgents = new Map();
  dayEvents.forEach((e) => {
    const p = e.payload.project;
    if (!p || p === "后台 / 杂项") return;
    if (!byProjAgents.has(p)) byProjAgents.set(p, new Set());
    byProjAgents.get(p).add(e.sourceAgent);
  });
  const convergeProjects = new Set([...byProjAgents].filter(([, s]) => s.size >= 2).map(([p]) => p));

  const lanes = order.map((agentId) => {
    const evs = dayEvents.filter((e) => e.sourceAgent === agentId);
    return {
      agentId,
      name: AGENTS[agentId].name,
      accent: AGENTS[agentId].accent,
      count: evs.reduce((s, e) => s + (e.payload.sessionCount || 1), 0),
      projectCount: new Set(evs.map((e) => e.payload.project).filter((p) => p && p !== "后台 / 杂项")).size,
      chips: evs.map((e) => ({
        minutes: toMin(e.occurredAt),
        time: e.occurredAt.slice(11, 16),
        project: e.payload.project,
        color: colorOf(e.payload.project),
        summary: e.payload.summary,
        converge: convergeProjects.has(e.payload.project)
      })).sort((a, b) => a.minutes - b.minutes)
    };
  }).filter((l) => l.chips.length);

  const cards = lanes.map((l) => {
    const myConv = new Set(l.chips.map((c) => c.project).filter((p) => convergeProjects.has(p)));
    const others = new Set();
    myConv.forEach((p) => byProjAgents.get(p).forEach((a) => { if (a !== l.agentId) others.add(AGENTS[a].name); }));
    return { agentId: l.agentId, name: l.name, accent: l.accent, count: l.count, projectCount: l.projectCount, convergeWith: [...others] };
  });

  const allMin = lanes.flatMap((l) => l.chips.map((c) => c.minutes));
  const axisStart = allMin.length ? Math.floor(Math.min(...allMin) / 60) * 60 : 8 * 60;
  const axisEnd = allMin.length ? Math.ceil(Math.max(...allMin) / 60) * 60 : 24 * 60;
  const convergence = [...byProjAgents]
    .filter(([, s]) => s.size >= 2)
    .map(([p, s]) => ({ project: p, agents: [...s].map((a) => AGENTS[a].name), color: colorOf(p) }))
    .sort((a, b) => b.agents.length - a.agents.length);

  return {
    lanes, cards, convergence,
    legend: projects.slice(0, 8).map((p) => ({ name: p, color: colorOf(p) })),
    axisStart: Math.max(0, axisStart), axisEnd: Math.min(24 * 60, Math.max(axisEnd, axisStart + 120))
  };
}

function buildWeeklyPreview(selectedDate, sourceEvents = EVENTS) {
  // Derive the week window from the actual events, newest first, so it aligns with
  // real (ingested) dates rather than the hardcoded seed calendar.
  const allDates = [...new Set(sourceEvents.map((event) => event.date))].sort((a, b) => b.localeCompare(a));
  const selectedIndex = Math.max(0, allDates.indexOf(selectedDate));
  const weekDates = allDates.slice(selectedIndex, selectedIndex + 7);
  const events = sourceEvents.filter((event) => weekDates.includes(event.date));
  const wins = events.filter((event) => ["artifact", "task_update", "decision", "handoff", "source_captured"].includes(event.eventType) && event.state === "accepted").slice(0, 5);
  const learnings = events.filter((event) => event.eventType === "learning").slice(0, 5);
  const risks = events.filter((event) => ["conflict", "quarantined", "redacted", "failed"].includes(event.state)).slice(0, 5);
  const next = events.filter((event) => ["suggestion", "sync_plan"].includes(event.eventType)).slice(0, 5);

  return {
    range: `${weekDates[weekDates.length - 1] || selectedDate} 至 ${weekDates[0] || selectedDate}`,
    wins: wins.map((event) => `${AGENTS[event.sourceAgent].name}: ${event.payload.title}`),
    learnings: learnings.map((event) => `${AGENTS[event.sourceAgent].name}: ${event.payload.summary}`),
    risks: risks.map((event) => `${stateLabel(event.state)}: ${event.payload.title}`),
    nextActions: next.map((event) => `${AGENTS[event.sourceAgent].name}: ${event.payload.summary}`)
  };
}

function buildDryRunSyncPlan(date, sourceEvents = EVENTS) {
  const daily = buildDailyProjection(date, sourceEvents);
  const weekly = buildWeeklyPreview(date, sourceEvents);
  return {
    id: `dry-run-${date}`,
    date,
    status: daily.dryRunSyncState === "pending" ? "pending" : "draft",
    externalCallsMade: false,
    targets: [
      {
        target: "feishu_doc_mock",
        title: "飞书 Doc 段落预览",
        mode: "append",
        preview: `${daily.title}\n${daily.summary}\n\n${daily.agents.map((agent) => `${agent.name}: ${agent.done[0]}`).join("\n")}`
      },
      {
        target: "feishu_wiki_mock",
        title: "飞书 Wiki 放置位置",
        mode: "place_after_section",
        preview: `Agent Work Journal / ${date} / ${daily.unresolvedCount ? "Needs Review" : "Daily Notes"}`
      },
      {
        target: "feishu_base_mock",
        title: "飞书 Base 字段预览",
        mode: "upsert",
        preview: "按 date + agent + eventId upsert。本地模拟，不写入外部系统。",
        fields: {
          Date: date,
          Completeness: `${daily.syncCompleteness}%`,
          Events: String(eventsForDate(date, sourceEvents).length),
          "Unresolved": String(daily.unresolvedCount),
          "Weekly Range": weekly.range
        }
      }
    ]
  };
}

function stateLabel(state) {
  const labels = {
    accepted: "Accepted",
    duplicate: "Duplicate ignored",
    conflict: "Conflict",
    quarantined: "Quarantined",
    redacted: "Redacted",
    pending_sync: "Pending dry-run",
    failed: "Recoverable failure"
  };
  return labels[state] || state;
}

  }));
}

// Merge the user's REAL local activity (data/events.local.jsonl) when served over
// http. Stays empty on file:// or when the file is absent — the public build never
// ships real data. Runs after the first render, then re-renders.
async function importLocalFile() {
  try {
    const res = await fetch(LOCAL_IMPORT_FILE, { cache: "no-store" });
    if (!res.ok) throw new Error("missing-local");
    const text = await res.text();
    const imported = text
      .split(/\r?\n/)
      .filter((line) => line.trim())
      .map((line) => { try { return JSON.parse(line); } catch { return null; } })
      .filter(Boolean)
      .filter(isJournalEvent);
    if (!imported.length) throw new Error("empty-local");
    // Local view is 100% REAL: drop the seed demo entirely, keep only imported
    // real activity + any notes the user typed here. No fabricated data on screen.
    const ownNotes = state.events.filter((event) => event.sourceInstance === "mock-ui");
    state.events = mergeEvents(imported, ownNotes);
    state.importedCount = imported.length;
    state.dataMode = "real";
    state.dateList = computeDateList(state.events);
    state.selectedDate = pickDefaultDate(imported);
    const idx = state.dateList.findIndex((d) => d.date === state.selectedDate);
    state.dateOffset = idx < 0 ? 0 : Math.floor(idx / 7) * 7;
    await importHumanReport();
    await importQualityReport();
    render();
  } catch {
    if (localDevHost) {
      enterSetupMode();
      render();
      return;
    }
    state.dataMode = "demo";
    /* file:// or public Pages — keep seed demo */
  }
}

async function importHumanReport() {
  try {
    const res = await fetch(HUMAN_REPORT_FILE, { cache: "no-store" });
    if (!res.ok) return;
    const report = await res.json();
    if (report && report.schemaVersion === "1.0" && report.date) {
      state.humanReport = report;
    }
  } catch {
    /* expected when no local generated report exists */
  }
}

async function importQualityReport() {
  try {
    const res = await fetch(QUALITY_REPORT_FILE, { cache: "no-store" });
    if (!res.ok) return;
    const report = await res.json();
    if (report && report.schemaVersion === "1.0" && report.latestDate) {
      state.qualityReport = report;
    }
  } catch {
    /* expected when no local quality report exists */
  }
}

function loadLocalJournal() {
  if (typeof localStorage === "undefined") {
    return { status: "memory-only", events: [] };
  }
  try {
    const raw = localStorage.getItem(JOURNAL_STORAGE_KEY);
    if (!raw) return { status: "ready", events: [] };
    const parsed = JSON.parse(raw);
    const events = Array.isArray(parsed.events) ? parsed.events.filter(isJournalEvent) : [];
    return { status: "ready", events };
  } catch {
    return { status: "storage-error", events: [] };
  }
}

function mergeEvents(seed, localEvents) {
  const byId = new Map();
  [...seed, ...localEvents].forEach((event) => byId.set(event.eventId, event));
  return [...byId.values()];
}

function isJournalEvent(event) {
  return Boolean(
    event &&
    event.schemaVersion === "1.0" &&
    typeof event.eventId === "string" &&
    typeof event.date === "string" &&
    ["codex", "claude_code", "hermes"].includes(event.sourceAgent) &&
    event.payload &&
    typeof event.payload.summary === "string"
  );
}

function localEvents() {
  return state.events.filter((event) => event.sourceInstance === "mock-ui");
}

function persistLocalJournal() {
  if (typeof localStorage === "undefined") {
    state.storageStatus = "memory-only";
    return;
  }
  try {
    localStorage.setItem(JOURNAL_STORAGE_KEY, JSON.stringify({
      schemaVersion: "1.0",
      savedAt: new Date().toISOString(),
      events: localEvents()
    }));
    state.storageStatus = "ready";
  } catch {
    state.storageStatus = "storage-error";
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function fmtDate(date) {
  return new Intl.DateTimeFormat("zh-CN", {
    timeZone: "Asia/Shanghai",
    month: "short",
    day: "numeric"
  }).format(new Date(`${date}T12:00:00+08:00`));
}

async function copyText(text) {
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch { /* fall through */ }
  try {
    const area = document.createElement("textarea");
    area.value = text;
    area.setAttribute("readonly", "");
    area.style.position = "fixed";
    area.style.left = "-9999px";
    document.body.append(area);
    area.select();
    const ok = document.execCommand("copy");
    area.remove();
    return ok;
  } catch {
    return false;
  }
}

function clip(s, n = 90) {
  const t2 = String(s == null ? "" : s);
  return t2.length > n ? t2.slice(0, n - 1) + "…" : t2;
}

function stripCount(s) {
  return String(s).replace(/^\d+\s*个\s*(Claude Code|Codex)\s*会话[：:]\s*/, "").trim();
}

function composeDiary(agent) {
  const lines = [...agent.done, ...agent.learned];
  if (!lines.length) return "";
  const sep = state.lang === "zh" ? "、" : ", ";
  const ctx = agent.projects.length
    ? `${t("diaryAcross")} ${agent.projects.slice(0, 3).join(sep)}${agent.projects.length > 3 ? "…" : ""}（${agent.sessionCount} ${t("diarySessions")}）。`
    : "";
  const body = lines.slice(0, 2).map((x) => clip(stripCount(x), 88)).join(" ");
  return `${ctx}${body}`.trim();
}

function activeHumanReport() {
  return state.humanReport?.date === state.selectedDate ? state.humanReport : null;
}

function humanAgent(agentId) {
  return activeHumanReport()?.agents?.find((agent) => agent.agentId === agentId) || null;
}

function humanActionsForAgent(agentId) {
  const items = activeHumanReport()?.items || [];
  return items.flatMap((item) =>
    (item.agentActions || [])
      .filter((action) => action.agentId === agentId)
      .map((action) => ({
        folder: item.folder || item.title,
        text: action.text
      }))
  );
}

function hasAgentContent(agent) {
  const human = humanAgent(agent.agentId);
  if (human) return true;
  return Boolean(agent.done.length || agent.learned.length || agent.tomorrow.length || agent.blockers.length);
}

function threadSentence(thread) {
  const names = [...new Set(thread.nodes.map((n) => n.name))];
  const who = state.lang === "zh" ? names.join("、") : names.join(" & ");
  const flag = thread.hasDisagreement ? `（${t("flagDisagree")}）` : "";
  return state.lang === "zh"
    ? `${thread.topic}：${who} 一起推进${flag}`
    : `${thread.topic}: ${who} worked together${flag}`;
}

function reportMarkdown(report) {
  const lines = [`# ${t("reportTitle")} — ${report.title}`, ""];
  report.sections.forEach((a) => {
    lines.push(`## ${a.name} · ${a.projects.length} ${t("diaryProjects")} / ${a.sessionCount} ${t("diarySessions")}`);
    a.projectBreakdown.slice(0, 6).forEach((b) => {
      lines.push(`- ${b.blocker ? "⚠️ " : ""}**${b.project}**${b.samples[0] ? ": " + stripCount(b.samples[0]) : ""}`);
    });
    a.tomorrow.slice(0, 3).forEach((x) => lines.push(`- (${t("tomorrowLabel")}) ${x}`));
    lines.push("");
  });
  if (report.threads.length) {
    lines.push(`## ${t("threadsCap")}`);
    report.threads.forEach((th) => lines.push(`- ${threadSentence(th)}`));
    lines.push("");
  }
  lines.push(`_generated by daybook · ${report.eventCount} events · ${t("mechDraft")}_`);
  return lines.join("\n");
}

function humanMarkdown(human) {
  const lines = [
    `# ${human.date} daybook 人话日报`,
    "",
    human.headline || "",
    "",
    human.overview || "",
    "",
    "## 按项目看"
  ];
  if (human.items?.length) {
    human.items.forEach((item) => {
      lines.push(`${item.index}. **${item.folder || item.title}**（${item.collaborationLabel || "单 agent 推进"} / ${item.statusLabel || humanStatusLabel(item.status)}）：${item.plain}`);
      lines.push(`   - 今日推进：${item.todayProgress?.[0] || "暂无明确推进记录。"}`);
      lines.push(`   - 关键判断：${item.keyJudgments?.[0] || "暂无新的关键判断。"}`);
      lines.push(`   - 明天注意：${item.tomorrowNotes?.[0] || "暂无明确明天事项。"}`);
      lines.push(`   - 需要用户介入：${item.needsUser?.[0] || "暂无需要用户介入的卡点。"}`);
      lines.push(`   - 证据：${item.evidenceCount || 0} 条有效事件；agent：${(item.agents || []).join("、") || "未知"}`);
      (item.agentActions || []).forEach((action) => {
        lines.push(`   - ${action.agent}：${action.text}`);
      });
    });
  } else {
    lines.push("- 暂无可读记录。");
  }
  if (human.agents?.length) {
    lines.push("", "## 按 agent 看");
    human.agents.forEach((agent) => lines.push(`- **${agent.name}**：${agent.plain}`));
  }
  lines.push("", "## 需要继续确认");
  (human.risks?.length ? human.risks : ["暂无需要用户介入的卡点。"]).forEach((risk) => lines.push(`- ${risk}`));
  lines.push("", "## 明天可以接着做");
  (human.next?.length ? human.next : ["暂无明确明天事项。"]).forEach((next) => lines.push(`- ${next}`));
  lines.push(
    "",
    "## 证据计数",
    `- 原始本地事件：${human.evidence?.rawEvents || 0}`,
    `- 进入日报正文：${human.evidence?.usefulEvents || 0}`,
    `- 协作项目：${human.evidence?.collaborationProjects || 0}`,
    `- 真实分歧项目：${human.evidence?.disagreementProjects || 0}`,
    "- 外部写入：0"
  );
  return lines.join("\n");
}

function humanStatusLabel(status) {
  if (status === "needs_attention") return "待确认";
  if (status === "in_progress") return "推进中";
  return "已完成";
}

function publishContent(target, report) {
  const human = state.humanReport?.date === report.date ? state.humanReport : null;
  const md = human ? humanMarkdown(human) : reportMarkdown(report);
  if (target === "markdown") return md;
  if (target === "feishu") return `# Feishu dry-run (not written)\n\n${md}`;
  const cmds = {
    codex: `codex exec --json "$(cat daybook-report-${report.date}.md)"`,
    claude_code: `claude -p "$(cat daybook-report-${report.date}.md)"`,
    hermes: `hermes send --oneshot --file daybook-report-${report.date}.md`
  };
  return `# dry-run command (NOT executed)\n${cmds[target] || target}\n\n# daybook-report-${report.date}.md\n${md}`;
}

        ${footerRisks.length ? `<div class="report-block"><h4>${t("risksLabel")}</h4>${list(footerRisks)}</div>` : ""}

          ${state.publishTarget === "feishu" ? `<div class="publish-preview"><pre>${escapeHtml(publishContent("feishu", report))}</pre><button class="primary compact" data-copy-publish="feishu">${t("copyMd")}</button></div>` : ""}

            <div class="human-item-head">

function stanceBadge(stance) {
  const map = STANCE_I18N[state.lang] || STANCE_I18N.zh;

  return `<span class="stance ${stance || "open"}">${icon} ${label}</span>`;
}

function threadFlag(thread) {
  if (thread.hasDisagreement) return `<span class="thread-flag">${t("flagDisagree")}</span>`;
  if (thread.implicit) return `<span class="thread-flag cowork">${t("flagCowork")}</span>`;
  return `<span class="thread-flag agreed">${t("flagAligned")}</span>`;
}

function renderThreads(daily) {
  const human = activeHumanReport();
  if (human) return renderHumanThreads(human);
  const threads = daily.threads;
  const anyDisagreement = threads.some((thread) => thread.hasDisagreement);
  const heading = anyDisagreement ? t("clash") : t("cowork");
  return `
    <section class="threads" aria-label="cross-agent threads">
      <div class="panel-heading">
        <div>
          <p class="small-caps">${t("threadsCap")}</p>
          <h3>${heading}</h3>
        </div>
        <span class="threads-count">${threads.length} ${t("threadsWord")}</span>
      </div>
      ${threads.length ? `
        <div class="thread-list">
          ${threads.map((thread) => `
            <article class="thread ${thread.hasDisagreement ? "has-disagreement" : ""} ${thread.implicit ? "is-cowork" : ""}">
              <header class="thread-head">
                <h4>${escapeHtml(thread.topic)}</h4>
                <div class="thread-flags">
                  ${thread.demo ? `<span class="thread-demo">Demo</span>` : ""}
                  ${threadFlag(thread)}
                </div>
              </header>
              <p class="thread-sentence">${escapeHtml(threadSentence(thread))}</p>
              <ol class="thread-chain">
                ${thread.nodes.map((node, index) => `
                  <li class="thread-node ${index === 0 ? "root" : "reply"}" style="--accent:${node.accent}">
                    <div class="thread-node-meta">
                      <strong>${escapeHtml(node.name)}</strong>
                      ${index === 0 ? "" : stanceBadge(node.stance)}

  `;
}

    <section class="threads" aria-label="cross-agent threads">
      <div class="panel-heading">

            <article class="thread is-cowork">
              <header class="thread-head">
                <h4><span class="folder-pill">${escapeHtml(item.folder || item.title)}</span></h4>
                <div class="thread-flags">${threadFlag({ implicit: true, hasDisagreement: false })}</div>

function renderCollab(collab) {
  if (!collab.lanes.length) return `<section class="collab"><div class="empty">${t("noCollab")}</div></section>`;
  const span = Math.max(60, collab.axisEnd - collab.axisStart);
  const xpct = (min) => ((min - collab.axisStart) / span) * 100;
  const ticks = [];
  for (let m = collab.axisStart; m <= collab.axisEnd; m += 120) ticks.push(m);
  return `
    <section class="collab">
      <div class="panel-heading">
        <div><p class="small-caps">${t("collabCap")}</p><h3>${t("collabHeading")}</h3></div>
      </div>
      <div class="collab-cards">
        ${collab.cards.map((c) => `
          <div class="collab-card" style="--accent:${c.accent}">
            <div class="collab-card-top"><span class="agent-dot"></span><strong>${escapeHtml(c.name)}</strong></div>
            <div class="collab-card-stat">${c.count} ${t("sessionsUnit")} · ${c.projectCount} ${t("diaryProjects")}</div>
            ${c.convergeWith.length ? `<div class="collab-card-conv">${t("convergeWith")} ${c.convergeWith.map(escapeHtml).join("、")}</div>` : ""}
          </div>
        `).join("")}
      </div>
      <div class="swimlane">
        <div class="swim-axis">${ticks.map((m) => `<span style="left:${xpct(m)}%">${String(Math.floor(m / 60)).padStart(2, "0")}:00</span>`).join("")}</div>
        ${collab.lanes.map((lane) => {
          let last = -Infinity;
          const GAP = 2.2;
          const chips = lane.chips.map((c) => {
            let x = xpct(c.minutes);
            if (x - last < GAP) x = last + GAP;
            last = x;
            x = Math.min(x, 99);
            const tip = `${c.time} · ${c.project}${c.summary ? " — " + clip(stripCount(c.summary), 80) : ""}`;
            return `<button class="swim-chip ${c.converge ? "converge" : ""}" style="left:${x}%; --c:${c.color}" title="${escapeHtml(tip)}"></button>`;
          }).join("");
          return `<div class="swim-row"><div class="swim-label" style="--accent:${lane.accent}"><strong>${escapeHtml(lane.name)}</strong><span>${lane.count}</span></div><div class="swim-track">${chips}</div></div>`;
        }).join("")}
      </div>
      <div class="collab-legend">${collab.legend.map((l) => `<span class="leg"><i style="background:${l.color}"></i>${escapeHtml(l.name)}</span>`).join("")}</div>
      ${collab.convergence.length ? `
        <div class="collab-converge">
          <h4>${t("convergeHeading")}</h4>
          <ul>${collab.convergence.map((c) => `<li><i style="background:${c.color}"></i><b>${escapeHtml(c.project)}</b>：${c.agents.map(escapeHtml).join("、")}</li>`).join("")}</ul>
        </div>` : ""}
      <p class="collab-hint">${t("collabHint")}</p>
    </section>
  `;
}

function renderTimeline(daily) {
  const laneOrder = ["codex", "claude_code", "hermes"];
  const toLeft = (time) => {
    const [h, m] = time.split(":").map(Number);
    let mins = h * 60 + m;
    if (mins < 18 * 60) mins += 24 * 60; // wrap events past midnight onto the 18:00–24:00 axis
    const pct = Math.max(0, Math.min(1, (mins - 18 * 60) / (6 * 60)));
    return pct * 80 + 6; // map to 6%–86%
  };
  const MIN_GAP = 12; // percent — keeps same-lane chips from overlapping
  const byLane = { codex: [], claude_code: [], hermes: [] };
  daily.conversation.forEach((item) => { if (byLane[item.agentId]) byLane[item.agentId].push(item); });
  const items = laneOrder.flatMap((agentId) => {
    const top = 24 + laneOrder.indexOf(agentId) * 44;
    let lastLeft = -Infinity;
    return byLane[agentId]
      .slice()
      .sort((a, b) => a.time.localeCompare(b.time))
      .map((item) => {
        const meta = AGENTS[agentId];
        const event = state.events.find((entry) => `conv-${entry.eventId}` === item.id);
        let left = toLeft(item.time);
        if (left - lastLeft < MIN_GAP) left = lastLeft + MIN_GAP;
        left = Math.min(left, 92);
        lastLeft = left;
        return `<button class="timeline-chip ${event?.state || "accepted"}" style="left:${left}%; top:${top}px; --accent:${meta.accent}" data-open-conversation="${agentId}">
          <span>${item.time}</span>${escapeHtml(event?.payload.title || item.text)}
        </button>`;
      });
  }).join("");

  return `
    <section class="timeline-panel">
      <div class="panel-heading">
        <div>
          <p class="small-caps">Event Projection Timeline</p>
          <h3>第二视角：当天任务流</h3>
        </div>
        <button class="secondary compact" data-action="show-safety">Inspect safety states</button>
      </div>
      <div class="timeline">
        <div class="time-axis"><span>18:00</span><span>20:00</span><span>22:00</span><span>00:00</span></div>
        ${["codex", "claude_code", "hermes"].map((agentId) => `
          <div class="lane-label" style="top:${31 + ["codex", "claude_code", "hermes"].indexOf(agentId) * 44}px; --accent:${AGENTS[agentId].accent}">
            ${AGENTS[agentId].name}
          </div>
        `).join("")}
        <div class="now-line"></div>
        ${items}
      </div>
    </section>
  `;
}
