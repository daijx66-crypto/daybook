name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:today
      - run: npm run check:jsonl
      - run: npm run check:security
      - run: npm run build:standalone
      - name: Verify generated standalone is current
        run: git diff --exit-code -- standalone.html
